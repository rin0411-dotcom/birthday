<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HAPPY BIRTHDAY PAPA</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#1D3461;
    --navy-dark:#142345;
    --gold:#F2C14E;
    --cream:#F4ECD8;
    --court:#8B6F47;
    --white:#FFFFFF;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    font-family:'Inter',sans-serif;
    background:var(--cream);
    color:var(--navy-dark);
    line-height:1.7;
  }
  img{max-width:100%;display:block;}

  /* ===== HERO: JERSEY PHOTO CARD ===== */
  .hero{
    background:var(--navy);
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:60px 20px;
    position:relative;
    overflow:hidden;
  }
  .hero::before{
    content:"";
    position:absolute;
    inset:0;
    background:
      repeating-linear-gradient(135deg, rgba(242,193,78,0.04) 0px, rgba(242,193,78,0.04) 2px, transparent 2px, transparent 40px);
  }
  .jersey-frame{
    position:relative;
    z-index:1;
    max-width:480px;
    width:100%;
  }
  .jersey-frame .eyebrow{
    color:var(--gold);
    font-size:0.85rem;
    letter-spacing:0.3em;
    font-weight:600;
    margin-bottom:22px;
  }
  .jersey-photo-wrap{
    position:relative;
    border:6px solid var(--gold);
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 20px 60px rgba(0,0,0,0.4);
    background:var(--navy-dark);
  }
  .jersey-photo-wrap img{
    width:100%;
    display:block;
    object-fit:cover;
  }
  .age-badge{
    position:absolute;
    bottom:18px;
    right:18px;
    background:var(--navy);
    border:4px solid var(--gold);
    border-radius:50%;
    width:96px;
    height:96px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Anton',sans-serif;
    color:var(--gold);
    font-size:2.3rem;
    box-shadow:0 8px 20px rgba(0,0,0,0.45);
  }
  .jersey-frame .sub{
    margin-top:26px;
    color:var(--cream);
    font-family:'Anton',sans-serif;
    font-size:clamp(1.6rem, 6vw, 2.4rem);
    letter-spacing:0.1em;
  }
  .jersey-frame .sub2{
    margin-top:8px;
    color:var(--gold);
    font-size:0.9rem;
    letter-spacing:0.25em;
  }
  .scroll-hint{
    margin-top:40px;
    color:var(--gold);
    font-size:0.85rem;
    letter-spacing:0.2em;
    z-index:1;
  }

  /* ===== SECTION SHARED ===== */
  section{
    padding:90px 20px;
    max-width:980px;
    margin:0 auto;
  }
  .section-head{
    text-align:center;
    margin-bottom:60px;
  }
  .section-head .tag{
    display:inline-block;
    font-family:'Anton',sans-serif;
    font-size:0.85rem;
    letter-spacing:0.3em;
    color:var(--court);
    border:2px solid var(--court);
    padding:6px 18px;
    border-radius:999px;
    margin-bottom:18px;
  }
  .section-head h2{
    font-family:'Anton',sans-serif;
    font-size:clamp(1.8rem, 6vw, 2.8rem);
    color:var(--navy);
    letter-spacing:0.05em;
  }

  /* ===== TEAM / LETTERS - LOCKER TAG STYLE ===== */
  .roster{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(220px, 1fr));
    gap:28px;
  }
  .player-card{
    background:var(--navy);
    border-radius:14px;
    overflow:hidden;
    cursor:pointer;
    transition:transform 0.25s ease, box-shadow 0.25s ease;
    position:relative;
    display:flex;
    flex-direction:column;
    box-shadow:0 8px 0 var(--court);
  }
  .player-card:hover{
    transform:translateY(-6px);
    box-shadow:0 14px 0 var(--gold);
  }
  .player-card .photo{
    aspect-ratio:1/1;
    background:linear-gradient(135deg, var(--court), #6b5536);
    display:flex;
    align-items:center;
    justify-content:center;
    color:var(--cream);
    font-family:'Anton',sans-serif;
    font-size:0.9rem;
    letter-spacing:0.1em;
    overflow:hidden;
    position:relative;
  }
  .player-card .photo img{width:100%;height:100%;object-fit:cover;}
  .player-card .photo .ph-number{
    font-family:'Anton',sans-serif;
    font-size:4rem;
    color:rgba(244,236,216,0.25);
    position:absolute;
  }
  .player-card .label{
    padding:14px 16px 18px;
    text-align:left;
    border-top:3px dashed var(--gold);
  }
  .player-card .label .role{
    display:block;
    font-size:0.7rem;
    letter-spacing:0.25em;
    color:var(--gold);
    margin-bottom:4px;
  }
  .player-card .label .name{
    font-family:'Anton',sans-serif;
    font-size:1.25rem;
    letter-spacing:0.05em;
    color:var(--cream);
  }
  .player-card .label .open-msg{
    margin-top:8px;
    display:inline-flex;
    align-items:center;
    gap:6px;
    font-size:0.7rem;
    letter-spacing:0.15em;
    color:var(--navy-dark);
    background:var(--gold);
    padding:5px 12px;
    border-radius:999px;
    font-weight:700;
  }

  /* ===== LETTER MODAL - TICKET STYLE ===== */
  .modal-overlay{
    position:fixed;
    inset:0;
    background:rgba(20,35,69,0.85);
    display:none;
    align-items:center;
    justify-content:center;
    padding:20px;
    z-index:100;
    backdrop-filter:blur(4px);
  }
  .modal-overlay.active{display:flex;}
  .letter{
    background:var(--cream);
    max-width:560px;
    width:100%;
    max-height:85vh;
    overflow-y:auto;
    border-radius:14px;
    padding:0;
    position:relative;
    box-shadow:0 25px 70px rgba(0,0,0,0.5);
  }
  .letter-header{
    background:var(--navy);
    padding:28px 36px;
    position:relative;
    overflow:hidden;
  }
  .letter-header::after{
    content:"";
    position:absolute;
    right:-30px; top:-30px;
    width:140px; height:140px;
    border:10px solid var(--gold);
    border-radius:50%;
    opacity:0.15;
  }
  .letter .from{
    font-family:'Anton',sans-serif;
    color:var(--gold);
    font-size:1.8rem;
    letter-spacing:0.08em;
    position:relative;
    z-index:1;
  }
  .letter .from-role{
    font-size:0.75rem;
    letter-spacing:0.25em;
    color:var(--cream);
    opacity:0.7;
    margin-top:4px;
    text-transform:uppercase;
    position:relative;
    z-index:1;
  }
  .letter-body-wrap{
    padding:36px;
  }
  .letter .body-text{
    white-space:pre-line;
    color:#3a3a3a;
    font-size:1.02rem;
  }
  .letter .signoff{
    margin-top:28px;
    font-family:'Anton',sans-serif;
    color:var(--navy);
    text-align:right;
  }
  .close-btn{
    position:absolute;
    top:16px;
    right:16px;
    width:36px;
    height:36px;
    border-radius:50%;
    border:none;
    background:var(--gold);
    color:var(--navy-dark);
    font-size:1.2rem;
    cursor:pointer;
    line-height:1;
    z-index:2;
    font-weight:700;
  }

  /* ===== SLIDESHOW - AUTO MARQUEE GRID ===== */
  .slideshow{
    background:var(--navy);
    border-radius:18px;
    padding:36px 0;
    text-align:center;
    overflow:hidden;
  }
  .marquee-row{
    display:flex;
    gap:16px;
    width:max-content;
  }
  .marquee-row.row2{
    margin-top:16px;
    animation-direction:reverse;
  }
  .marquee-track{
    animation:scroll-left 60s linear infinite;
  }
  .marquee-row.row2 .marquee-track{
    animation:scroll-right 70s linear infinite;
  }
  @keyframes scroll-left{
    from{transform:translateX(0);}
    to{transform:translateX(-50%);}
  }
  @keyframes scroll-right{
    from{transform:translateX(-50%);}
    to{transform:translateX(0);}
  }
  .marquee-track{
    display:flex;
    gap:16px;
  }
  .slide-item{
    flex:0 0 auto;
    width:200px;
    aspect-ratio:1/1;
    border-radius:10px;
    overflow:hidden;
    border:3px solid var(--gold);
    background:linear-gradient(135deg,#2a4a8a,#142345);
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .slide-item img{width:100%;height:100%;object-fit:cover;object-position:center top;}
  .slide-item .placeholder{
    color:var(--cream);
    font-family:'Anton',sans-serif;
    font-size:1rem;
    letter-spacing:0.1em;
  }
  @media (max-width:600px){
    .slide-item{width:140px;}
  }

  /* ===== FOOTER ===== */
  footer{
    text-align:center;
    padding:50px 20px 70px;
    color:var(--court);
    font-size:0.85rem;
    letter-spacing:0.15em;
  }
  footer .num{
    font-family:'Anton',sans-serif;
    color:var(--navy);
    font-size:1.4rem;
    letter-spacing:0.1em;
  }

  @media (prefers-reduced-motion: reduce){
    .player-card, .slide-controls button{transition:none;}
  }
</style>
</head>

      from: "りん より",
      role: "DAUGHTER",
      body: `パパ、お誕生日おめでとう!

ここに本物のメッセージを入れてください。`,
      signoff: "— りん"
    }
  };

  function openLetter(key){
    const data = letters[key];
    document.getElementById('letterFrom').textContent = data.from;
    document.getElementById('letterRole').textContent = data.role;
    document.getElementById('letterBody').textContent = data.body;
    document.getElementById('letterSignoff').textContent = data.signoff;
    document.getElementById('modalOverlay').classList.add('active');
  }
  function closeLetter(){
    document.getElementById('modalOverlay').classList.remove('active');
  }
  function closeLetterBG(e){
    if(e.target.id === 'modalOverlay') closeLetter();
  }
</script>
